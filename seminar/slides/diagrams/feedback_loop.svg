<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="Inter, Segoe UI, sans-serif">
  <rect width="700" height="340" fill="#f8f9fa" rx="12"/>
  <text x="350" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Feedback Loop &amp; Continuous Improvement</text>

  <!-- Upload -->
  <rect x="30" y="70" width="120" height="54" rx="8" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="90" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="white">User Upload</text>
  <text x="90" y="111" text-anchor="middle" font-size="9" fill="#cce0ff">audio + roster</text>

  <line x1="150" y1="97" x2="188" y2="97" stroke="#999" stroke-width="1.5" marker-end="url(#c)"/>

  <!-- Pipeline -->
  <rect x="190" y="70" width="120" height="54" rx="8" fill="#7209b7" stroke="#5c0795" stroke-width="1.5"/>
  <text x="250" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Pipeline</text>
  <text x="250" y="111" text-anchor="middle" font-size="9" fill="#e8c8ff">7-stage processing</text>

  <line x1="310" y1="97" x2="348" y2="97" stroke="#999" stroke-width="1.5" marker-end="url(#c)"/>

  <!-- Results -->
  <rect x="350" y="70" width="120" height="54" rx="8" fill="#f72585" stroke="#d4157a" stroke-width="1.5"/>
  <text x="410" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Results</text>
  <text x="410" y="111" text-anchor="middle" font-size="9" fill="#ffd6eb">action items JSON</text>

  <line x1="470" y1="97" x2="508" y2="97" stroke="#999" stroke-width="1.5" marker-end="url(#c)"/>

  <!-- User Review -->
  <rect x="510" y="70" width="140" height="54" rx="8" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="580" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="white">User Review</text>
  <text x="580" y="111" text-anchor="middle" font-size="9" fill="#cce0ff">sửa assignee / desc</text>

  <!-- Arrow down from User Review -->
  <line x1="580" y1="124" x2="580" y2="158" stroke="#999" stroke-width="1.5" marker-end="url(#c)"/>

  <!-- Feedback Store -->
  <rect x="490" y="160" width="180" height="54" rx="8" fill="#06d6a0" stroke="#05b888" stroke-width="1.5"/>
  <text x="580" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Feedback Store</text>
  <text x="580" y="201" text-anchor="middle" font-size="9" fill="#d0fff5">_feedback.jsonl</text>

  <!-- Arrow left to Celery Beat -->
  <line x1="490" y1="187" x2="368" y2="187" stroke="#999" stroke-width="1.5" marker-end="url(#c)"/>

  <!-- Celery Beat -->
  <rect x="220" y="160" width="145" height="54" rx="8" fill="#118ab2" stroke="#0e7494" stroke-width="1.5"/>
  <text x="292" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Celery Beat</text>
  <text x="292" y="201" text-anchor="middle" font-size="9" fill="#cceeff">check every 24h · ≥50 corrections?</text>

  <!-- Arrow down to Retrain -->
  <line x1="292" y1="214" x2="292" y2="248" stroke="#999" stroke-width="1.5" marker-end="url(#c)"/>

  <!-- Retrain -->
  <rect x="190" y="250" width="200" height="54" rx="8" fill="#f72585" stroke="#d4157a" stroke-width="1.5"/>
  <text x="290" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Auto Retrain</text>
  <text x="290" y="291" text-anchor="middle" font-size="9" fill="#ffd6eb">QLoRA · MLflow log · deploy</text>

  <!-- Curved arrow back to Pipeline -->
  <path d="M 190 277 Q 90 277 90 190 Q 90 124 188 97" stroke="#4cc9f0" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#cBlue)"/>
  <text x="55" y="235" font-size="9" fill="#4cc9f0" font-weight="bold">model</text>
  <text x="55" y="248" font-size="9" fill="#4cc9f0" font-weight="bold">improved</text>

  <defs>
    <marker id="c" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
    <marker id="cBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4cc9f0"/>
    </marker>
  </defs>
</svg>
