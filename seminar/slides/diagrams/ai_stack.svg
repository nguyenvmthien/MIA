<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="Inter, Segoe UI, sans-serif">
  <rect width="760" height="420" fill="#f8f9fa" rx="12"/>
  <text x="380" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">AI / ML Stack — Model Pipeline</text>

  <!-- Row labels -->
  <text x="16" y="98" font-size="10" fill="#888" font-style="italic">ASR</text>
  <text x="16" y="198" font-size="10" fill="#888" font-style="italic">RAG</text>
  <text x="16" y="298" font-size="10" fill="#888" font-style="italic">LLM</text>

  <!-- ===== ROW 1: ASR ===== -->
  <!-- Audio -->
  <rect x="50" y="60" width="110" height="60" rx="8" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Audio Input</text>
  <text x="105" y="103" text-anchor="middle" font-size="9" fill="#cce0ff">.mp3 / .wav / .m4a</text>

  <line x1="160" y1="90" x2="198" y2="90" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- WhisperX -->
  <rect x="200" y="60" width="160" height="60" rx="8" fill="#7209b7" stroke="#5c0795" stroke-width="1.5"/>
  <text x="280" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="white">WhisperX large-v3</text>
  <text x="280" y="99" text-anchor="middle" font-size="9" fill="#e8c8ff">ASR + Pyannote 3.1 diarize</text>
  <text x="280" y="113" text-anchor="middle" font-size="9" fill="#e8c8ff">word-level timestamps</text>

  <line x1="360" y1="90" x2="398" y2="90" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Transcript -->
  <rect x="400" y="60" width="160" height="60" rx="8" fill="#06d6a0" stroke="#05b888" stroke-width="1.5"/>
  <text x="480" y="83" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Transcript</text>
  <text x="480" y="99" text-anchor="middle" font-size="9" fill="#d0fff5">Speaker-labelled turns</text>
  <text x="480" y="113" text-anchor="middle" font-size="9" fill="#d0fff5">source_turn_ids provenance</text>

  <!-- ===== ROW 2: RAG ===== -->
  <!-- Roster -->
  <rect x="50" y="160" width="110" height="60" rx="8" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="105" y="185" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Roster JSON</text>
  <text x="105" y="203" text-anchor="middle" font-size="9" fill="#cce0ff">employee names + aliases</text>

  <line x1="160" y1="190" x2="198" y2="190" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- nomic-embed -->
  <rect x="200" y="160" width="160" height="60" rx="8" fill="#7209b7" stroke="#5c0795" stroke-width="1.5"/>
  <text x="280" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="white">nomic-embed-text</text>
  <text x="280" y="199" text-anchor="middle" font-size="9" fill="#e8c8ff">local embeddings</text>
  <text x="280" y="213" text-anchor="middle" font-size="9" fill="#e8c8ff">via Ollama (no API)</text>

  <line x1="360" y1="190" x2="398" y2="190" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FAISS -->
  <rect x="400" y="160" width="160" height="60" rx="8" fill="#06d6a0" stroke="#05b888" stroke-width="1.5"/>
  <text x="480" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="white">FAISS Speaker Index</text>
  <text x="480" y="199" text-anchor="middle" font-size="9" fill="#d0fff5">RAG: resolve speaker name</text>
  <text x="480" y="213" text-anchor="middle" font-size="9" fill="#d0fff5">→ correct assignee</text>

  <!-- ===== ROW 3: LLM ===== -->
  <!-- Prompt -->
  <rect x="50" y="260" width="110" height="60" rx="8" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="105" y="285" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Prompt Builder</text>
  <text x="105" y="303" text-anchor="middle" font-size="9" fill="#cce0ff">system + few-shot + CoT</text>

  <line x1="160" y1="290" x2="198" y2="290" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Qwen -->
  <rect x="200" y="260" width="160" height="60" rx="8" fill="#f72585" stroke="#d4157a" stroke-width="1.5"/>
  <text x="280" y="281" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Qwen2.5-3B-Instruct</text>
  <text x="280" y="297" text-anchor="middle" font-size="9" fill="#ffd6eb">GGUF Q4_K_M · via Ollama</text>
  <text x="280" y="311" text-anchor="middle" font-size="9" fill="#ffd6eb">100% local · ~2 GB RAM</text>

  <line x1="360" y1="290" x2="398" y2="290" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="400" y="260" width="160" height="60" rx="8" fill="#06d6a0" stroke="#05b888" stroke-width="1.5"/>
  <text x="480" y="283" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Action Items JSON</text>
  <text x="480" y="299" text-anchor="middle" font-size="9" fill="#d0fff5">assignee · due_date · priority</text>
  <text x="480" y="313" text-anchor="middle" font-size="9" fill="#d0fff5">confidence · source_turn_ids</text>

  <!-- ===== Connecting vertical lines (transcript → LLM, FAISS → LLM) ===== -->
  <!-- Transcript → Prompt (vertical down through rows) -->
  <path d="M 480 120 L 480 145 L 620 145 L 620 290 L 562 290" stroke="#4cc9f0" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrBlue)"/>
  <text x="630" y="215" font-size="9" fill="#4cc9f0">chunk</text>

  <!-- FAISS → Prompt -->
  <path d="M 480 220 L 480 245 L 105 245 L 105 260" stroke="#ffd166" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrYellow)"/>
  <text x="260" y="241" font-size="9" fill="#ffd166">resolved speaker name</text>

  <!-- ===== Inference Optimizations bar ===== -->
  <rect x="50" y="350" width="670" height="48" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="385" y="366" text-anchor="middle" font-size="10" font-weight="bold" fill="#4cc9f0">Inference Optimizations</text>
  <text x="140" y="385" text-anchor="middle" font-size="9" fill="#ccc">Q4_K_M: 6GB→2GB RAM</text>
  <text x="310" y="385" text-anchor="middle" font-size="9" fill="#ccc">Redis: skip re-process chunk</text>
  <text x="490" y="385" text-anchor="middle" font-size="9" fill="#ccc">Chunk ≤ 2048 tokens · parallel</text>
  <text x="650" y="385" text-anchor="middle" font-size="9" fill="#ccc">Multi-Ollama LB</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4cc9f0"/>
    </marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffd166"/>
    </marker>
  </defs>
</svg>
