apiVersion: 1

groups:
  - orgId: 1
    name: Meeting Agent Alerts
    folder: Meeting Agent
    interval: 5m
    rules:
      - uid: correction-rate-spike
        title: Correction Rate Spike (Model Drift)
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: meeting_correction_rate
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: prometheus
            model:
              expr: avg_over_time(meeting_correction_rate[1h])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A - $B
              hide: false
              refId: C
              type: math
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: "Correction rate spiked — possible model drift"
          description: "Current correction rate is more than 2 above 1h average. Check if recent model update degraded quality."
        labels:
          severity: warning
          team: ml

      - uid: false-positive-rate-high
        title: False Positive Rate High
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: meeting_false_positive_rate > 0.4
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Error
        for: 15m
        annotations:
          summary: "False positive rate > 40%"
          description: "More than 40% of extracted tasks are being dismissed by users. Model may be hallucinating tasks."
        labels:
          severity: critical
          team: ml
