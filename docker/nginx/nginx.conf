# Rate limit zones — defined in http context
# POST /meetings is the heavy endpoint (audio upload + LLM inference)
# General limit covers all other API traffic

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Rate limit zones ──────────────────────────────────────────────────────
    # Rate limit key: non-empty only for POST /meetings (audio upload)
    map $request_method $meeting_post_key {
        POST    $binary_remote_addr;
        default "";
    }

    # 30 req/s per IP for general API traffic
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    # 2 req/min per IP for POST /meetings only (expensive: audio + LLM)
    limit_req_zone $meeting_post_key zone=meeting_submit:10m rate=2r/m;
    # 60 req/s for Grafana/UI dashboards (frequent polling)
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=60r/s;

    limit_req_status 429;
    limit_conn_status 429;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── TLS settings ──────────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Timeouts (large audio uploads) ───────────────────────────────────────
    client_max_body_size    500m;
    client_body_timeout     120s;
    proxy_read_timeout      180s;
    proxy_send_timeout      60s;
    proxy_connect_timeout   10s;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream api {
        server api:8000;
    }

    upstream web {
        server web:3001;
    }

    upstream grafana {
        server grafana:3000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS — API ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header X-Frame-Options           SAMEORIGIN                             always;
        add_header X-XSS-Protection          "1; mode=block"                        always;

        # ── Next.js Web UI (root) ─────────────────────────────────────────────
        location / {
            proxy_pass         http://web;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket for Next.js HMR
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── API backend ───────────────────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── POST /meetings — strict rate limit (audio upload) ────────────────
        location = /meetings {
            limit_req zone=meeting_submit burst=3 nodelay;
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            client_max_body_size 500m;
        }

        # ── All other API traffic ─────────────────────────────────────────────
        location ~ ^/(meetings|workers|metrics|health|feedback) {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            limit_req zone=dashboard burst=120 nodelay;
            proxy_pass         http://grafana;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Block /metrics from public access (internal Prometheus only)
        location = /metrics {
            deny all;
            return 403;
        }
    }
}
