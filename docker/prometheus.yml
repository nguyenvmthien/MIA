global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: "meeting-agent-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "meeting-agent-worker"
    static_configs:
      - targets: ["worker:9100"]
    metrics_path: /

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
