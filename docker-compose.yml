name: meeting-agent

x-db-env: &db-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-meeting}:${POSTGRES_PASSWORD:-meeting}@postgres:5432/${POSTGRES_DB:-meeting_agent}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  OLLAMA_BASE_URL: http://ollama:11434

services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meeting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting}
      POSTGRES_DB: ${POSTGRES_DB:-meeting_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meeting} -d ${POSTGRES_DB:-meeting_agent}"]
      interval: 10s
      retries: 5

  # ── Cache / Broker ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── LLM inference (Ollama) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:3b && ollama pull nomic-embed-text && wait"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q qwen2.5"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  # ── DB Migration (runs once, then exits) ───────────────────────────────────
  migrator:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: alembic upgrade head
    env_file: .env
    environment:
      <<: *db-env
    depends_on:
      postgres:
        condition: service_healthy

  # ── API (FastAPI) ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn meeting_agent.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      <<: *db-env
    volumes:
      - ./data:/app/data
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A meeting_agent.pipeline.worker_task.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    env_file: .env
    environment:
      <<: *db-env
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ── Next.js Web UI ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      BACKEND_API_URL: http://api:8000
      AUTH_URL: http://localhost:3001
      AUTH_TRUST_HOST: "true"
      AUTH_SECRET: ${AUTH_SECRET:-m9w0uRaiiSXrGv4X/WRd9b4nyi92fFu1BecpTu1NQWM=}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      api:
        condition: service_started

  # ── pgAdmin (database browser) ────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./docker/pgadmin/pgpass:/pgpass:ro

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:
