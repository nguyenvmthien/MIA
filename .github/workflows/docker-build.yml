name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile*"
      - "pyproject.toml"
      - "alembic/**"
      - "web/**"

env:
  REGISTRY: ghcr.io
  # Automatically derived from the GitHub repo path (lowercase)
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-push:
    name: Build & push (${{ matrix.target }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            dockerfile: Dockerfile.api
            image_suffix: api
          - target: worker
            dockerfile: Dockerfile.worker
            image_suffix: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-success:
    name: Notify deploy-ready
    needs: build-push
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Print image refs
        run: |
          echo "Images pushed to GHCR:"
          echo "  ghcr.io/${{ github.repository }}-api:sha-$(echo ${{ github.sha }} | head -c7)"
          echo "  ghcr.io/${{ github.repository }}-worker:sha-$(echo ${{ github.sha }} | head -c7)"
          echo ""
          echo "To deploy, update your .env:"
          echo "  API_IMAGE=ghcr.io/${{ github.repository }}-api:sha-$(echo ${{ github.sha }} | head -c7)"
          echo "  WORKER_IMAGE=ghcr.io/${{ github.repository }}-worker:sha-$(echo ${{ github.sha }} | head -c7)"
