name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/ train/ data_pipeline/
      - run: mypy src/meeting_agent --ignore-missing-imports

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=src pytest tests/ -v \
            --cov=meeting_agent \
            --cov-report=term-missing \
            --cov-fail-under=60
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  schema-validation:
    name: Schema conformance smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Validate fixture outputs against schemas
        run: |
          PYTHONPATH=src python - <<'EOF'
          from meeting_agent.schemas import MeetingSummary, ExtractedTask, TranscriptTurn
          from meeting_agent.schemas.worker import WorkerRoster
          import json, pathlib

          fixtures = list(pathlib.Path("tests/fixtures").glob("*.json")) if pathlib.Path("tests/fixtures").exists() else []
          print(f"Validating {len(fixtures)} fixture(s)...")
          for f in fixtures:
              data = json.loads(f.read_text())
              MeetingSummary.model_validate(data)
              print(f"  ✓ {f.name}")
          print("All schema validations passed.")
          EOF

  eval-smoke:
    name: Extraction quality smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run if eval fixtures exist (skip in forks / early PRs)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run eval smoke (requires Ollama — skips gracefully if unavailable)
        env:
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          if [ -f "data/eval/gold_smoke.jsonl" ]; then
            PYTHONPATH=src python train/evaluate.py \
              --gold data/eval/gold_smoke.jsonl \
              --out /tmp/eval_results.json
            python - <<'EOF'
          import json, sys
          r = json.load(open("/tmp/eval_results.json"))
          print(f"Precision: {r['avg_precision']:.3f}  Recall: {r['avg_recall']:.3f}  F1: {r['avg_f1']:.3f}")
          if r['avg_precision'] < 0.80:
              print("FAIL: precision below smoke threshold 0.80")
              sys.exit(1)
          print("PASS")
          EOF
          else
            echo "No eval fixtures found — skipping eval smoke."
          fi

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t meeting-agent:ci .
