name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/ scripts/
      # mypy skipped — optional type-only deps (datasets, torch) not installed in CI
      # - run: mypy src/meeting_agent --ignore-missing-imports

  hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/check_repo_hygiene.py

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql://meeting:meeting@localhost:5432/meeting_agent
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          OLLAMA_BASE_URL: http://localhost:11434
          HF_TOKEN: hf_stub
        run: |
          PYTHONPATH=src pytest tests/ -v \
            --cov=meeting_agent \
            --cov-report=term-missing \
            --cov-fail-under=60
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  schema-validation:
    name: Schema conformance smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Validate fixture outputs against schemas
        env:
          DATABASE_URL: postgresql://meeting:meeting@localhost:5432/meeting_agent
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          OLLAMA_BASE_URL: http://localhost:11434
          HF_TOKEN: hf_stub
        run: |
          PYTHONPATH=src python - <<'EOF'
          from meeting_agent.schemas import MeetingSummary, ExtractedTask, TranscriptTurn
          from meeting_agent.schemas.worker import WorkerRoster
          import json, pathlib

          fixtures = list(pathlib.Path("tests/fixtures").glob("*.json")) if pathlib.Path("tests/fixtures").exists() else []
          print(f"Validating {len(fixtures)} fixture(s)...")
          for f in fixtures:
              data = json.loads(f.read_text())
              MeetingSummary.model_validate(data)
              print(f"  ✓ {f.name}")
          print("All schema validations passed.")
          EOF

  dataset-compatibility:
    name: Dataset compatibility smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: PYTHONPATH=src python scripts/dataset_compat_smoke.py

  migration-smoke:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meeting
          POSTGRES_PASSWORD: meeting
          POSTGRES_DB: meeting_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://meeting:meeting@localhost:5432/meeting_agent
        run: alembic upgrade head

  web:
    name: Web lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret
          AUTH_SECRET: ci-secret
          GOOGLE_CLIENT_ID: ci-client
          GOOGLE_CLIENT_SECRET: ci-secret
          NEXT_PUBLIC_API_URL: http://localhost:8000
          BACKEND_API_URL: http://localhost:8000
        run: npm run build

  eval-smoke:
    name: Extraction quality smoke test
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run if eval fixtures exist (skip in forks / early PRs)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run eval smoke (requires Ollama — skips gracefully if unavailable)
        env:
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          if [ -f "data/eval/gold_smoke.jsonl" ]; then
            PYTHONPATH=src python -m meeting_agent.mlops.evaluate \
              --gold data/eval/gold_smoke.jsonl \
              --out /tmp/eval_results.json
            python - <<'EOF'
          import json, sys
          r = json.load(open("/tmp/eval_results.json"))
          print(f"Precision: {r['avg_precision']:.3f}  Recall: {r['avg_recall']:.3f}  F1: {r['avg_f1']:.3f}")
          if r['avg_precision'] < 0.70:
              print("FAIL: precision below smoke threshold 0.70")
              sys.exit(1)
          print("PASS")
          EOF
          else
            echo "No eval fixtures found — skipping eval smoke."
          fi

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: root
            dockerfile: Dockerfile
          - name: api
            dockerfile: Dockerfile.api
          - name: worker
            dockerfile: Dockerfile.worker
          - name: web
            dockerfile: Dockerfile.web
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f ${{ matrix.dockerfile }} -t meeting-agent-${{ matrix.name }}:ci .
