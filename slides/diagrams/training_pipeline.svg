<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 300" font-family="Inter, Segoe UI, sans-serif">
  <rect width="780" height="300" fill="#f8f9fa" rx="12"/>
  <text x="390" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Training Pipeline</text>

  <!-- Data Sources -->
  <rect x="20" y="60" width="120" height="50" rx="7" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="80" y="81" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Synthetic</text>
  <text x="80" y="97" text-anchor="middle" font-size="9" fill="#cce0ff">LLM-generated</text>

  <rect x="20" y="130" width="120" height="50" rx="7" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="80" y="151" text-anchor="middle" font-size="11" font-weight="bold" fill="white">AMI Corpus</text>
  <text x="80" y="167" text-anchor="middle" font-size="9" fill="#cce0ff">public dataset</text>

  <rect x="20" y="200" width="120" height="50" rx="7" fill="#4361ee" stroke="#3a56d4" stroke-width="1.5"/>
  <text x="80" y="221" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Feedback</text>
  <text x="80" y="237" text-anchor="middle" font-size="9" fill="#cce0ff">user corrections</text>

  <!-- Arrows to Validator -->
  <line x1="140" y1="85" x2="188" y2="145" stroke="#999" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="140" y1="155" x2="188" y2="155" stroke="#999" stroke-width="1.5" marker-end="url(#b)"/>
  <line x1="140" y1="225" x2="188" y2="165" stroke="#999" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- Validator -->
  <rect x="190" y="110" width="130" height="90" rx="7" fill="#7209b7" stroke="#5c0795" stroke-width="1.5"/>
  <text x="255" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Validator</text>
  <text x="255" y="151" text-anchor="middle" font-size="9" fill="#e8c8ff">schema · bias</text>
  <text x="255" y="167" text-anchor="middle" font-size="9" fill="#e8c8ff">leakage · dedup</text>
  <text x="255" y="183" text-anchor="middle" font-size="9" fill="#e8c8ff">70/15/15 split</text>

  <line x1="320" y1="155" x2="358" y2="155" stroke="#999" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- QLoRA Fine-Tune -->
  <rect x="360" y="100" width="150" height="110" rx="7" fill="#f72585" stroke="#d4157a" stroke-width="1.5"/>
  <text x="435" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="white">QLoRA Fine-Tune</text>
  <text x="435" y="141" text-anchor="middle" font-size="9" fill="#ffd6eb">Unsloth + HF PEFT</text>
  <text x="435" y="157" text-anchor="middle" font-size="9" fill="#ffd6eb">Qwen2.5-3B 4-bit NF4</text>
  <text x="435" y="173" text-anchor="middle" font-size="9" fill="#ffd6eb">LoRA rank=16, α=32</text>
  <text x="435" y="189" text-anchor="middle" font-size="9" fill="#ffd6eb">Optuna hyperparams</text>

  <line x1="510" y1="155" x2="548" y2="155" stroke="#999" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- Eval Gate -->
  <rect x="550" y="120" width="110" height="70" rx="7" fill="#06d6a0" stroke="#05b888" stroke-width="1.5"/>
  <text x="605" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Eval Gate</text>
  <text x="605" y="161" text-anchor="middle" font-size="9" fill="#d0fff5">F1 ≥ 0.90</text>
  <text x="605" y="177" text-anchor="middle" font-size="9" fill="#d0fff5">halluc ≤ 5%</text>

  <line x1="660" y1="155" x2="698" y2="155" stroke="#999" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- MLflow -->
  <rect x="700" y="120" width="60" height="70" rx="7" fill="#118ab2" stroke="#0e7494" stroke-width="1.5"/>
  <text x="730" y="143" text-anchor="middle" font-size="10" font-weight="bold" fill="white">MLflow</text>
  <text x="730" y="161" text-anchor="middle" font-size="8" fill="#cceeff">model</text>
  <text x="730" y="177" text-anchor="middle" font-size="8" fill="#cceeff">registry</text>

  <!-- Distillation note -->
  <rect x="360" y="240" width="400" height="44" rx="7" fill="#e9ecef" stroke="#ced4da" stroke-width="1"/>
  <text x="560" y="259" text-anchor="middle" font-size="10" fill="#495057" font-weight="bold">Optional: Distillation 3B → 1.5B  (KL-divergence)  ·  LoRA Pruning 30%</text>
  <text x="560" y="276" text-anchor="middle" font-size="9" fill="#6c757d">target: CPU-only deploy  ·  ~2× faster  ·  &lt;5% quality loss</text>

  <defs>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
  </defs>
</svg>
