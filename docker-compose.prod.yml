# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env file: .env (copy from .env.example, fill all values)
# Secrets must NOT be hardcoded here — they come from .env only.

services:

  postgres:
    ports: []  # don't expose DB port externally in prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meeting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting}
      POSTGRES_DB: ${POSTGRES_DB:-meeting_agent}
    restart: unless-stopped

  redis:
    ports: []  # don't expose Redis externally in prod
    restart: unless-stopped

  api:
    ports: []  # only accessible via nginx in prod
    restart: unless-stopped
    command: >
      uvicorn meeting_agent.api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --proxy-headers
      --forwarded-allow-ips='*'
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      LOG_LEVEL: WARNING

  worker:
    restart: unless-stopped
    environment:
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-2}
      LOG_LEVEL: WARNING
    healthcheck:
      test: ["CMD-SHELL", "celery -A meeting_agent.pipeline.worker_task.celery_app inspect ping -t 5 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  ollama:
    restart: unless-stopped
    ports: []  # don't expose Ollama externally

  web:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-https://localhost}
    restart: unless-stopped
    ports: []  # only accessible via nginx in prod
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-https://localhost}
      BACKEND_API_URL: http://api:8000
      AUTH_URL: ${PUBLIC_URL:-https://localhost}
      AUTH_TRUST_HOST: "true"
      AUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

  # ── Nginx reverse proxy + TLS termination ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
      ui:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1/health 2>/dev/null | grep -q ok || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  pgadmin:
    restart: unless-stopped
    ports:
      - "5050:80"

  grafana:
    restart: unless-stopped
    ports: []  # in prod, access Grafana via nginx /grafana/
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://localhost/grafana}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  prometheus:
    restart: unless-stopped
    ports: []  # only accessible via Grafana, not publicly
